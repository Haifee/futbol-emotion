[start]
cmd = "mkdir -p /app/bootstrap/cache /app/storage/framework/sessions /app/storage/framework/views /app/storage/framework/cache/data /app/storage/logs /app/storage/app/public && chmod -R 777 /app/bootstrap/cache /app/storage && cat > /nginx.conf << 'EOF'\nerror_log /dev/stderr;\nworker_processes 5;\ndaemon off;\nworker_rlimit_nofile 8192;\nevents { worker_connections 4096; }\nhttp {\n  index index.html index.htm index.php;\n  default_type application/octet-stream;\n  access_log /dev/stdout;\n  sendfile on;\n  tcp_nopush on;\n  server_names_hash_bucket_size 128;\n  server {\n    listen 80;\n    listen [::]:80;\n    server_name localhost;\n    root /app/public;\n    add_header X-Frame-Options \"SAMEORIGIN\";\n    add_header X-Content-Type-Options \"nosniff\";\n    index index.php;\n    charset utf-8;\n    location / {\n      try_files $uri $uri/ /index.php?$query_string;\n    }\n    location = /favicon.ico { access_log off; log_not_found off; }\n    location = /robots.txt { access_log off; log_not_found off; }\n    error_page 404 /index.php;\n    location ~ \\.php$ {\n      fastcgi_pass 127.0.0.1:9000;\n      fastcgi_index index.php;\n      fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;\n      fastcgi_param QUERY_STRING $query_string;\n      fastcgi_param REQUEST_METHOD $request_method;\n      fastcgi_param CONTENT_TYPE $content_type;\n      fastcgi_param CONTENT_LENGTH $content_length;\n      fastcgi_param SCRIPT_NAME $fastcgi_script_name;\n      fastcgi_param PATH_INFO $fastcgi_path_info;\n      fastcgi_param REQUEST_URI $request_uri;\n      fastcgi_param DOCUMENT_URI $document_uri;\n      fastcgi_param DOCUMENT_ROOT $realpath_root;\n      fastcgi_param SERVER_PROTOCOL $server_protocol;\n      fastcgi_param GATEWAY_INTERFACE CGI/1.1;\n      fastcgi_param SERVER_SOFTWARE nginx;\n      fastcgi_param REMOTE_ADDR $remote_addr;\n      fastcgi_param REMOTE_PORT $remote_port;\n      fastcgi_param SERVER_ADDR $server_addr;\n      fastcgi_param SERVER_PORT $server_port;\n      fastcgi_param SERVER_NAME $server_name;\n    }\n    location ~ /\\.(?!well-known).* {\n      deny all;\n    }\n  }\n}\nEOF\n(php-fpm -y /assets/php-fpm.conf & nginx -c /nginx.conf)"
